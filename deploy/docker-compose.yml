services:
  mysql:
    image: mysql:8.4
    profiles:
      - infra
      - production
    environment:
      MYSQL_DATABASE: gewehub
      MYSQL_USER: gewehub
      MYSQL_PASSWORD: gewehub
      MYSQL_ROOT_PASSWORD: gewehub-root
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h127.0.0.1 -ugewehub -pgewehub --silent"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7.2-alpine
    profiles:
      - infra
      - production
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  server:
    image: gewehub-server:local
    build:
      context: ..
      dockerfile: server/Dockerfile
    env_file:
      - ../server/.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-mysql://gewehub:gewehub@host.docker.internal:3306/gewehub}
      REDIS_URL: ${REDIS_URL:-redis://host.docker.internal:6379/0}
      PUBLIC_BASE_URL: http://3i2956l679.51vip.biz
      WEB_ORIGIN: http://localhost:8080
      JSON_BODY_LIMIT_BYTES: 16777216
      GEWE_SEND_TIMEOUT_MS: 120000
      GEWE_SILK_ENCODER_PATH: /opt/silk-v3-encoder/silk/encoder
      GEWE_SILK_DECODER_PATH: /opt/silk-v3-decoder/silk/decoder
      PRISMA_ENGINES_MIRROR: https://registry.npmmirror.com/-/binary/prisma
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "3000:3000"
      - "8090:3000"
    volumes:
      - file-storage:/app/server/storage/files

  migrate:
    image: gewehub-server:local
    build:
      context: ..
      dockerfile: server/Dockerfile
    env_file:
      - ../server/.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-mysql://gewehub:gewehub@host.docker.internal:3306/gewehub}
      REDIS_URL: ${REDIS_URL:-redis://host.docker.internal:6379/0}
      PRISMA_ENGINES_MIRROR: https://registry.npmmirror.com/-/binary/prisma
    command: ["node", "node_modules/prisma/build/index.js", "migrate", "deploy"]

  web:
    build:
      context: ..
      dockerfile: web/Dockerfile
      args:
        VITE_CALLBACK_BASE_URL: ${VITE_CALLBACK_BASE_URL:-http://3i2956l679.51vip.biz}
    depends_on:
      - server
    ports:
      - "8080:80"

  caddy:
    image: caddy:2.8-alpine
    profiles:
      - production
    depends_on:
      - web
      - server
    environment:
      GEWEHUB_DOMAIN: ${GEWEHUB_DOMAIN:-localhost}
      ACME_EMAIL: ${ACME_EMAIL:-internal}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  file-storage:
  mysql-data:
  redis-data:
  caddy-data:
  caddy-config:
